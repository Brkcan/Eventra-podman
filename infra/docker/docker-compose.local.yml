services:
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: eventra-local-oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: secret
      APP_USER: eventra
      APP_USER_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s
    volumes:
      - oracle-data:/opt/oracle/oradata

  oracle-init:
    image: gvenzl/oracle-free:latest
    container_name: eventra-local-oracle-init
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      ORACLE_APP_USER: eventra
      ORACLE_APP_PASSWORD: secret
      ORACLE_CONNECT_STRING: oracle:1521/FREEPDB1
    volumes:
      - ../../:/work
      - ./oracle-init.sh:/oracle-init.sh:ro
    working_dir: /work
    entrypoint: ["/bin/sh", "/oracle-init.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: eventra-local-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: eventra-local-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

volumes:
  oracle-data:
