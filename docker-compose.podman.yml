services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      - PORT=3001
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=eventra-api
      - POSTGRES_URL=postgresql://eventra:eventra@postgres:5432/eventra
      - REDIS_URL=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3001:3001"

  rule-engine:
    build:
      context: .
      dockerfile: services/rule-engine/Dockerfile
    env_file:
      - .env
    environment:
      - KAFKA_BROKERS=kafka:9092
      - POSTGRES_URL=postgresql://eventra:eventra@postgres:5432/eventra
      - REDIS_URL=redis://redis:6379
      - RULE_ENGINE_HEALTH_PORT=3002
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3002:3002"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    ports:
      - "3000:80"

  cache-loader:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CACHE_LOADER_PORT=3010
      - CACHE_LOADER_METADATA_DB_URL=postgresql://eventra:eventra@postgres:5432/eventra
      - POSTGRES_URL=postgresql://eventra:eventra@postgres:5432/eventra
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
